<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2DGP - Game Platform</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #ffffff; --accent-color: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; overflow-x: hidden; }
        
        /* Sidebar */
        nav { width: 240px; height: 100vh; background: #0a0a0a; padding: 20px; border-right: 1px solid #333; position: fixed; display: flex; flex-direction: column; }
        .logo { font-size: 28px; font-weight: 800; color: var(--accent-color); margin-bottom: 40px; }
        .nav-item { padding: 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .nav-item:hover { background: #222; color: var(--accent-color); }
        .active-nav { background: var(--accent-color); color: #000; font-weight: bold; }

        /* Main Content */
        main { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        .view { display: none; }
        .active { display: block; }

        /* Auth UI */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card-bg); padding: 40px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; outline: none; }
        input:focus { border-color: var(--accent-color); }

        /* Components */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .game-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .btn { background: var(--accent-color); color: #000; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-secondary { background: transparent; color: #888; border: none; cursor: pointer; margin-top: 15px; font-size: 14px; }
        textarea { width: 100%; height: 300px; background: #000; color: #0f0; border-radius: 10px; padding: 15px; font-family: monospace; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">Welcome to 2DGP</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password (Min. 6 chars)">
        <button class="btn" onclick="handleAuth()">Submit</button>
        <button class="btn-secondary" id="auth-toggle-btn" onclick="toggleAuthMode()">Don't have an account? Sign Up</button>
    </div>
</div>

<nav>
    <div class="logo">2DGP</div>
    <div class="nav-item active-nav" onclick="showView('home', this)">🏠 Home</div>
    <div class="nav-item" onclick="showView('create', this)">🛠️ Create</div>
    <div class="nav-item" onclick="showView('mygames', this)">🎮 My Games</div>
    <div class="nav-item" onclick="showView('settings', this)">⚙️ Settings</div>
    <div style="margin-top:auto" class="nav-item" onclick="logout()">🚪 Logout</div>
</nav>

<main>
    <section id="home" class="view active">
        <h1>Global Games</h1>
        <div class="game-grid">
            <div class="game-card"><h3>Snake</h3><button class="btn">Play</button></div>
            <div class="game-card"><h3>Pong</h3><button class="btn">Play</button></div>
            <div class="game-card"><h3>Breakout</h3><button class="btn">Play</button></div>
        </div>
    </section>

    <section id="create" class="view">
        <h1>Publish a Game</h1>
        <input type="text" id="newGameTitle" placeholder="Game Name">
        <textarea id="gameCode" placeholder="Paste your HTML/CSS/JS code here..."></textarea>
        <button class="btn" onclick="publishGame()">🚀 Publish</button>
    </section>

    <section id="mygames" class="view">
        <h1>Your Creations</h1>
        <div id="user-games-list" class="game-grid">
            <p style="color: #666;">No games published yet.</p>
        </div>
    </section>

    <section id="settings" class="view">
        <h1>Settings</h1>
        <div class="game-card">
            <p>Theme Background Color:</p>
            <input type="color" id="bgPicker" value="#121212" onchange="applySettings()">
        </div>
    </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCPTMfSDrUa7-4GQZ1Z85uDm4ND_WVQR6I",
        authDomain: "dgp-88a38.firebaseapp.com",
        projectId: "dgp-88a38",
        appId: "1:481321958468:web:28e2b88508beb8cb0c1011"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 2. Global State
    let isSignUp = false;

    // 3. UI Functions
    function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('auth-title').innerText = isSignUp ? "Join 2DGP" : "Welcome Back";
        document.getElementById('auth-toggle-btn').innerText = isSignUp ? "Have an account? Login" : "Don't have an account? Sign Up";
    }

    function showView(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        if(el) el.classList.add('active-nav');
    }

    // 4. Core Authentication Logic
    async function handleAuth() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username || !password) return alert("Please fill in all fields!");
        if (password.length < 6) return alert("Password must be at least 6 characters!");

        // Format username to a valid email format for Firebase
        const cleanEmail = username.toLowerCase().replace(/[^a-z0-9]/g, '') + "@2dgp.com";

        try {
            if (isSignUp) {
                // Sign Up Path
                const res = await auth.createUserWithEmailAndPassword(cleanEmail, password);
                await db.collection("users").doc(res.user.uid).set({
                    username: username,
                    bg: '#121212',
                    createdAt: new Date()
                });
                alert("Account created successfully!");
            } else {
                // Login Path
                await auth.signInWithEmailAndPassword(cleanEmail, password);
            }
            document.getElementById('auth-overlay').style.display = 'none';
        } catch (e) {
            console.error("Auth Error Details:", e);
            alert("Firebase Error: " + e.message);
        }
    }

    // Auth Observer (Checks if user is already logged in)
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('auth-overlay').style.display = 'none';
            loadUserGames();
        } else {
            document.getElementById('auth-overlay').style.display = 'flex';
        }
    });

    function logout() {
        auth.signOut().then(() => {
            location.reload();
        });
    }

    // 5. Game Database Logic
    async function publishGame() {
        const title = document.getElementById('newGameTitle').value.trim();
        const code = document.getElementById('gameCode').value.trim();
        
        if (!title || !code) return alert("Please enter a game name and code!");

        try {
            await db.collection("games").add({
                uid: auth.currentUser.uid,
                title: title,
                code: code,
                timestamp: new Date()
            });
            alert("Game Published!");
            document.getElementById('newGameTitle').value = "";
            document.getElementById('gameCode').value = "";
            loadUserGames();
            showView('mygames', document.querySelectorAll('.nav-item')[2]);
        } catch (e) {
            alert("Error publishing: " + e.message);
        }
    }

    async function loadUserGames() {
        if (!auth.currentUser) return;
        
        try {
            const snapshot = await db.collection("games")
                                     .where("uid", "==", auth.currentUser.uid)
                                     .get();
            const container = document.getElementById('user-games-list');
            container.innerHTML = "";
            
            if (snapshot.empty) {
                container.innerHTML = '<p style="color: #666;">No games published yet.</p>';
                return;
            }

            snapshot.forEach(doc => {
                container.innerHTML += `
                    <div class="game-card">
                        <h3>${doc.data().title}</h3>
                        <p style="color: #00ff88; font-size: 12px;">Status: Live</p>
                        <button class="btn" style="background: #333; color: white;">Manage</button>
                    </div>`;
            });
        } catch (e) {
            console.log("Error loading games:", e);
        }
    }

    function applySettings() {
        const bg = document.getElementById('bgPicker').value;
        document.body.style.backgroundColor = bg;
    }
</script>

</body>
</html>
