<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2DGP - 2D Game Platform</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #00ff88;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
        }

        /* Sidebar Navigation */
        nav {
            width: 250px;
            height: 100vh;
            background: #111;
            padding: 20px;
            border-right: 1px solid #333;
            position: fixed;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--accent-color); margin-bottom: 30px; }
        
        .nav-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-item:hover { background: #222; }

        /* Main Content */
        main {
            margin-left: 290px;
            padding: 40px;
            width: 100%;
        }

        .view { display: none; }
        .active { display: block; }

        /* Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #444;
        }

        button {
            background: var(--accent-color);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .online-dot {
            height: 10px;
            width: 10px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">2DGP</div>
    <div class="nav-item" onclick="showView('home')">🏠 Home / Games</div>
    <div class="nav-item" onclick="showView('create')">🛠️ Create Game</div>
    <div class="nav-item" onclick="showView('profile')">👤 My Account</div>
    <div class="nav-item" onclick="showView('friends')">👥 Friends List</div>
    <div class="nav-item" onclick="showView('settings')">⚙️ Settings</div>
</nav>

<main>
    <section id="home" class="view active">
        <h1>Featured Games</h1>
        <div class="game-grid">
            <div class="game-card"><h3>Snake</h3><button>Play</button></div>
            <div class="game-card"><h3>Tic Tac Toe</h3><button>Play</button></div>
            <div class="game-card"><h3>Pong</h3><button>Play</button></div>
            <div class="game-card"><h3>Breakout</h3><button>Play</button></div>
            <div class="game-card"><h3>Flappy Bird</h3><button>Play</button></div>
            <div class="game-card"><h3>2048</h3><button>Play</button></div>
        </div>
    </section>

    <section id="create" class="view">
        <h1>Game Editor</h1>
        <textarea id="gameCode" style="width:100%; height:300px; background:#000; color:#0f0;" placeholder="Paste your HTML/JS code here..."></textarea><br><br>
        <button onclick="publishGame()">Publish Game</button>
    </section>

    <section id="settings" class="view">
        <h1>Settings</h1>
        <label>Background Color:</label>
        <input type="color" id="bgColor" onchange="updateSettings()"><br><br>
        <label>Font Style:</label>
        <select id="fontSelect" onchange="updateSettings()">
            <option value="Arial">Arial</option>
            <option value="Courier New">Retro (Courier)</option>
            <option value="Georgia">Classic (Georgia)</option>
        </select>
    </section>

    <section id="friends" class="view">
        <h1>Friends</h1>
        <div id="friendList">
            <p><span class="online-dot"></span> PlayerOne (Online)</p>
            <p><span class="online-dot" style="background:#555"></span> DevUser (Offline)</p>
        </div>
    </section>
</main>

<script>
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    function updateSettings() {
        const bg = document.getElementById('bgColor').value;
        const font = document.getElementById('fontSelect').value;
        document.body.style.backgroundColor = bg;
        document.body.style.fontFamily = font;
    }

    function publishGame() {
        const code = document.getElementById('gameCode').value;
        if(code) {
            alert("Game Published to 'Your Games'!");
            // In a real app, you'd send 'code' to your database here.
        }
    }
</script>

</body>
</html>
