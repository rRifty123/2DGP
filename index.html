<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2DGP - Game Platform</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #ffffff; --accent-color: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; overflow-x: hidden; }
        
        /* Sidebar */
        nav { width: 240px; height: 100vh; background: #0a0a0a; padding: 20px; border-right: 1px solid #333; position: fixed; display: flex; flex-direction: column; }
        .logo { font-size: 28px; font-weight: 800; color: var(--accent-color); margin-bottom: 40px; }
        .nav-item { padding: 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .nav-item:hover { background: #222; color: var(--accent-color); }
        .active-nav { background: var(--accent-color); color: #000; font-weight: bold; }

        /* Main Content */
        main { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        .view { display: none; }
        .active { display: block; }

        /* Auth UI */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card-bg); padding: 40px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; }

        /* Components */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .game-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .btn { background: var(--accent-color); color: #000; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-secondary { background: transparent; color: #888; border: none; cursor: pointer; margin-top: 15px; }
        textarea { width: 100%; height: 300px; background: #000; color: #0f0; border-radius: 10px; padding: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">Welcome to 2DGP</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password (Min. 6 chars)">
        <button class="btn" onclick="handleAuth()">Submit</button>
        <button class="btn-secondary" id="auth-toggle-btn" onclick="toggleAuthMode()">Don't have an account? Sign Up</button>
    </div>
</div>

<nav>
    <div class="logo">2DGP</div>
    <div class="nav-item active-nav" onclick="showView('home', this)">🏠 Home</div>
    <div class="nav-item" onclick="showView('create', this)">🛠️ Create</div>
    <div class="nav-item" onclick="showView('mygames', this)">🎮 My Games</div>
    <div class="nav-item" onclick="showView('settings', this)">⚙️ Settings</div>
    <div style="margin-top:auto" class="nav-item" onclick="logout()">🚪 Logout</div>
</nav>

<main>
    <section id="home" class="view active">
        <h1>Global Games</h1>
        <div class="game-grid">
            <div class="game-card"><h3>Snake</h3><button class="btn">Play</button></div>
            <div class="game-card"><h3>Pong</h3><button class="btn">Play</button></div>
        </div>
    </section>

    <section id="create" class="view">
        <h1>Publish a Game</h1>
        <input type="text" id="newGameTitle" placeholder="Game Name">
        <textarea id="gameCode" placeholder="Paste your <html> code here..."></textarea>
        <button class="btn" onclick="publishGame()">🚀 Publish</button>
    </section>

    <section id="mygames" class="view">
        <h1>Your Creations</h1>
        <div id="user-games-list" class="game-grid"></div>
    </section>

    <section id="settings" class="view">
        <h1>Settings</h1>
        <div class="game-card">
            <p>Theme Color:</p><input type="color" id="bgPicker" value="#121212" onchange="applySettings()">
        </div>
    </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
   // CLEAN CONFIG - VERIFY THESE NUMBERS!
    const firebaseConfig = {
        apiKey: "AIzaSyCPTMfSDrUa7-4GQZ1Z85uDm4ND_WVQR6I", 
        authDomain: "dgp-88a38.firebaseapp.com",
        projectId: "dgp-88a38",
        appId: "1:481321958468:web:28e2b88508beb8cb0c1011"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function handleAuth() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username || !password) return alert("Please enter both!");

        // The "Clean Email" logic
        const cleanEmail = username.toLowerCase().replace(/[^a-z0-9]/g, '') + "@2dgp.com";
        
        console.log("Attempting login with:", cleanEmail); // Debugging

        try {
            if (isSignUp) {
                await auth.createUserWithEmailAndPassword(cleanEmail, password);
                await db.collection("users").doc(auth.currentUser.uid).set({
                    username: username,
                    created: new Date()
                });
                alert("Account Created!");
            } else {
                await auth.signInWithEmailAndPassword(cleanEmail, password);
            }
            document.getElementById('auth-overlay').style.display = 'none';
        } catch (e) {
            console.error("FULL ERROR OBJECT:", e);
            alert("Error: " + e.message);
        }
    }

    // 2. FIXED AUTH LOGIC
    async function handleAuth() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username || !password) return alert("Fill in all fields!");
        if (password.length < 6) return alert("Password must be 6+ characters!");

        // Creates a clean email format for Firebase
        const cleanEmail = username.toLowerCase().replace(/\s+/g, '') + "@2dgp.com";

        try {
            if (isSignUp) {
                const res = await auth.createUserWithEmailAndPassword(cleanEmail, password);
                await db.collection("users").doc(res.user.uid).set({
                    username: username,
                    bg: '#121212'
                });
                alert("Success! Account created.");
            } else {
                await auth.signInWithEmailAndPassword(cleanEmail, password);
            }
            document.getElementById('auth-overlay').style.display = 'none';
        } catch (e) {
            console.error("Auth Error Details:", e);
            alert(e.message); // This line was missing 'alert'
        }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.getElementById('auth-overlay').style.display = 'none';
            loadUserGames();
        }
    });

    async function publishGame() {
        const title = document.getElementById('newGameTitle').value;
        const code = document.getElementById('gameCode').value;
        if (!title || !code) return alert("Title and Code required!");

        await db.collection("games").add({
            uid: auth.currentUser.uid,
            title: title,
            code: code
        });
        alert("Published!");
        loadUserGames();
        showView('mygames', document.querySelector('.nav-item:nth-child(4)'));
    }

    async function loadUserGames() {
        const snapshot = await db.collection("games").where("uid", "==", auth.currentUser.uid).get();
        const container = document.getElementById('user-games-list');
        container.innerHTML = "";
        snapshot.forEach(doc => {
            container.innerHTML += `<div class="game-card"><h3>${doc.data().title}</h3><p>Game Live ✅</p></div>`;
        });
    }

    function applySettings() {
        const bg = document.getElementById('bgPicker').value;
        document.body.style.backgroundColor = bg;
    }
</script>
</body>
</html>
